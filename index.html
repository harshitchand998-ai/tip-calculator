<!DOCTYPE html>
<html>
<head>
    <title>Tip Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background-color: #4e73df;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #2e59d9;
        }

        .result {
            margin-top: 20px;
            padding: 10px;
            background-color: #f8f9fc;
            border-radius: 6px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Tip Calculator</h2>

    <label>Bill Amount</label>
    <input type="number" id="bill" placeholder="Enter bill amount">

    <label>Tip Percentage</label>
    <input type="number" id="tip" placeholder="Enter tip %">

    <button onclick="calculateTip()">Calculate</button>

    <div class="result">
        <p>Total: ₹<span id="totalAmount">0.00</span></p>
    </div>
</div>


<script src="script.js"></script>






</body>
</html>
